<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>HörspielLog – Folge 42 Detail</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }

  :root {
    --sf-font: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif;
    --bg: #000000;
    --panel-bg: rgba(44, 44, 46, 0.72);
    --panel-border: rgba(255, 255, 255, 0.12);
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.58);
    --text-tertiary: rgba(255, 255, 255, 0.38);
    --accent: #0A84FF;
    --green: #30D158;
    --green-bg: rgba(48, 209, 88, 0.14);
    --yellow: #FFD60A;
    --divider: rgba(255, 255, 255, 0.08);
    --chip-bg: rgba(255, 255, 255, 0.1);
    --heart-red: #FF375F;
  }

  body {
    font-family: var(--sf-font);
    background: var(--bg);
    color: var(--text-primary);
    width: 390px;
    margin: 0 auto;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
  }

  /* Full-screen blurred cover background */
  .cover-wash {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    height: 100%;
    z-index: 0;
    overflow: hidden;
  }

  .cover-wash::before {
    content: '';
    position: absolute;
    top: -40px;
    left: -40px;
    right: -40px;
    bottom: -40px;
    background:
      radial-gradient(ellipse at 30% 20%, #1a0a3e 0%, transparent 60%),
      radial-gradient(ellipse at 70% 40%, #0d2a5c 0%, transparent 55%),
      radial-gradient(ellipse at 50% 70%, #12084a 0%, transparent 50%),
      radial-gradient(ellipse at 20% 80%, #1e0e4d 0%, transparent 40%),
      linear-gradient(180deg, #0a0520 0%, #0d1a3a 40%, #070318 100%);
    filter: blur(56px) saturate(1.4);
    opacity: 0.72;
    transform: scale(1.12);
  }

  .cover-wash::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(
      180deg,
      rgba(0, 0, 0, 0.45) 0%,
      rgba(0, 0, 0, 0.34) 40%,
      rgba(0, 0, 0, 0.66) 100%
    );
  }

  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    height: 54px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .status-bar .time { font-variant-numeric: tabular-nums; }
  .status-bar .icons { display: flex; gap: 5px; align-items: center; }
  .status-bar .icons svg { width: 18px; height: 18px; fill: white; }

  /* Navigation bar */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 8px 8px;
    height: 44px;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .nav-back {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--accent);
    font-size: 17px;
    font-weight: 400;
    text-decoration: none;
    padding: 6px 4px 6px 0;
  }

  .nav-back svg {
    width: 22px;
    height: 22px;
    fill: var(--accent);
    flex-shrink: 0;
  }

  .nav-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    flex: 1;
    text-align: center;
    white-space: nowrap;
    padding: 0 4px;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    z-index: 2;
  }

  .nav-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .nav-icon-btn:active {
    transform: scale(0.85);
  }

  .nav-icon-btn svg {
    width: 22px;
    height: 22px;
  }

  .nav-icon-btn.heart svg {
    fill: var(--heart-red);
  }

  .nav-icon-btn.bookmark svg {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.8;
  }

  .nav-edit {
    color: var(--accent);
    font-size: 17px;
    font-weight: 400;
    text-decoration: none;
  }

  /* Content area */
  .content {
    padding: 0 16px;
    padding-bottom: 40px;
  }

  /* Hero cover */
  .hero-cover {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  .hero-cover-image {
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 25% 25%, #2a1065 0%, transparent 50%),
      radial-gradient(ellipse at 75% 30%, #0f3d8c 0%, transparent 45%),
      radial-gradient(ellipse at 50% 85%, #1a0845 0%, transparent 50%),
      radial-gradient(ellipse at 35% 55%, #162060 0%, transparent 40%),
      linear-gradient(160deg, #0e0730 0%, #152878 35%, #1a0a4a 65%, #0a0320 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .hero-cover-image::after {
    content: '?';
    font-size: 160px;
    font-weight: 800;
    color: rgba(255, 255, 255, 0.06);
    position: absolute;
    bottom: 20px;
    right: 30px;
    line-height: 1;
    font-family: var(--sf-font);
  }

  .hero-cover-text {
    font-size: 42px;
    font-weight: 800;
    color: rgba(255, 255, 255, 0.12);
    letter-spacing: -1px;
    text-align: center;
    line-height: 1.1;
    padding: 20px;
  }

  /* Glass panel */
  .glass-panel {
    background: var(--panel-bg);
    backdrop-filter: blur(40px) saturate(1.6);
    -webkit-backdrop-filter: blur(40px) saturate(1.6);
    border-radius: 24px;
    border: 0.5px solid var(--panel-border);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
    overflow: hidden;
  }

  .panel-block {
    padding: 18px;
  }

  .panel-divider {
    height: 0.5px;
    background: var(--divider);
    margin: 0;
  }

  /* Info block */
  .info-subtitle {
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .info-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 14px;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .info-status-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 100px;
    background: var(--green-bg);
    color: var(--green);
    font-size: 14px;
    font-weight: 500;
  }

  .status-badge svg {
    width: 14px;
    height: 14px;
    fill: var(--green);
  }

  .rating-stars {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .rating-stars svg {
    width: 16px;
    height: 16px;
  }

  .star-filled { fill: var(--yellow); }
  .star-empty { fill: rgba(255, 255, 255, 0.2); }

  .spacer { flex: 1; }

  .listen-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1.5px solid var(--accent);
    background: rgba(10, 132, 255, 0.12);
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: var(--sf-font);
  }

  .listen-btn svg {
    width: 14px;
    height: 14px;
    fill: var(--accent);
  }

  .info-last-listened {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 10px;
  }

  /* Moods block */
  .block-header {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .mood-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .mood-chip {
    display: inline-flex;
    align-items: center;
    padding: 5px 10px;
    border-radius: 100px;
    background: var(--chip-bg);
    font-size: 14px;
    font-weight: 400;
    color: var(--text-primary);
  }

  /* Streaming block */
  .streaming-link {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-size: 17px;
    font-weight: 400;
    text-decoration: none;
    padding: 0;
  }

  .streaming-link svg {
    width: 22px;
    height: 22px;
    fill: var(--accent);
  }

  /* Note block */
  .note-text {
    font-size: 17px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.45;
  }

  /* Annotation callout */
  .annotation {
    position: fixed;
    z-index: 100;
    pointer-events: none;
  }

  .annotation-box {
    background: rgba(255, 59, 48, 0.12);
    border: 1.5px solid rgba(255, 59, 48, 0.6);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 500;
    color: #FF6B6B;
    white-space: nowrap;
    backdrop-filter: blur(20px);
  }

  .callout-container {
    position: relative;
    width: 390px;
    margin: 0 auto;
  }

  .callout-arrow {
    position: absolute;
    width: 50px;
    height: 30px;
  }

  /* Callout annotations overlay */
  .annotations-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 390px;
    height: 100%;
    z-index: 50;
    pointer-events: none;
  }

  .callout {
    position: absolute;
    display: flex;
    align-items: flex-start;
    gap: 4px;
  }

  .callout-label {
    background: rgba(10, 132, 255, 0.15);
    border: 1px solid rgba(10, 132, 255, 0.4);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .callout-line {
    width: 20px;
    height: 1px;
    background: rgba(10, 132, 255, 0.4);
    margin-top: 10px;
    flex-shrink: 0;
  }

  .callout-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 7px;
    flex-shrink: 0;
  }

  /* Callout positions — below nav bar, pointing up to icons */
  .callout-heart {
    top: 94px;
    left: 219px;
    transform: translateX(-50%);
    flex-direction: column;
    align-items: center;
  }

  .callout-heart .callout-line {
    width: 1px;
    height: 16px;
    margin: 0;
  }

  .callout-heart .callout-dot {
    margin: 0;
    order: -1;
  }

  .callout-bookmark {
    top: 94px;
    left: 265px;
    transform: translateX(-50%);
    flex-direction: column;
    align-items: center;
  }

  .callout-bookmark .callout-line {
    width: 1px;
    height: 16px;
    margin: 0;
  }

  .callout-bookmark .callout-dot {
    margin: 0;
    order: -1;
  }
</style>
</head>
<body>

<div class="cover-wash"></div>

<div class="screen">

    <div class="icons">
